services:
  - type: worker
    name: twitter-discord-bot
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && playwright install chromium && playwright install-deps chromium
    startCommand: python playwright_continuous_bot.py
    envVars:
      - key: TWITTER_USERNAME
        value: aleabitoreddit
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: DISCORD_CHANNEL_ID
        sync: false
      - key: POLL_INTERVAL
        value: 120
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: SENTIMENT_ENABLED
        value: true
      - key: FLIP_ALERTS_ENABLED
        value: true
      - key: DB_PATH
        value: /app/data/sentiment.db
      - key: COOKIES_FILE
        value: /app/data/twikit_cookies.json
      - key: LAST_TWEET_FILE
        value: /app/data/last_tweet_id.txt
    disk:
      name: data
      mountPath: /app/data
      sizeGB: 1
